<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="288" height="512"></canvas>
    <div id="ui-overlay">
      <!-- Start Screen -->
      <div id="start-screen" class="screen active">
        <div class="title-box">
          <h1 class="game-title">FLAPPY<br>BIRD</h1>
        </div>
        <div class="bird-preview">🐦</div>
        <div class="instructions">
          <p>Press <kbd>Space</kbd> or <kbd>Tap</kbd> to flap</p>
          <p>Avoid the pipes!</p>
        </div>
        <button id="start-btn" class="game-btn">START GAME</button>
        <div class="high-score-display">
          BEST: <span id="start-best">0</span>
        </div>
      </div>

      <!-- HUD (shown during game) -->
      <div id="hud" class="screen">
        <div id="score-display">0</div>
      </div>

      <!-- Game Over Screen -->
      <div id="gameover-screen" class="screen">
        <div class="gameover-panel">
          <h2 class="gameover-title">GAME OVER</h2>
          <div class="score-table">
            <div class="score-row">
              <span class="score-label">SCORE</span>
              <span class="score-label">BEST</span>
            </div>
            <div class="score-row">
              <span id="final-score" class="score-value">0</span>
              <span id="final-best" class="score-value">0</span>
            </div>
            <div id="medal-row" class="medal-row"></div>
          </div>
          <button id="restart-btn" class="game-btn">PLAY AGAIN</button>
          <p class="restart-hint">or press <kbd>Space</kbd> / tap screen</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
